version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kktc_galeri_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-kktc_galeri}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kktc_galeri_network

  redis:
    image: redis:7-alpine
    container_name: kktc_galeri_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kktc_galeri_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kktc_galeri_api_prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-kktc_galeri}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    networks:
      - kktc_galeri_network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: kktc_galeri_web_prod
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4000/api
    ports:
      - "3000:3000"
    networks:
      - kktc_galeri_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  kktc_galeri_network:
    driver: bridge
